name: NixNet Tests

on:
  push:
    branches:
    #  - main
      - dev
  pull_request:

jobs:
  check:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - name: Configure kernel
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      - name: Run tests
        run: nix run .#test
