name: Publish Option Docs

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build option docs
        run: nix build .#nixnet-option-docs

      - name: Push to wiki
        run: |
          git clone https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.wiki.git wiki
          cp result wiki/nixnet-options-docs-latest.md
          cd wiki
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add nixnet-options-docs-latest.md
          git diff --cached --quiet || git commit -m "Update option docs"
          git push