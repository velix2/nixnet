name: Publish Option Docs

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build option docs
        run: nix build .#nixnet-option-docs

      - name: Convert to HTML
        run: |
          nix shell nixpkgs#pandoc --command \
            pandoc result \
              --from gfm \
              --to html5 \
              --standalone \
              --metadata title="NixNet Options" \
              --output nixnet-options-docs.html

      - name: Publish to latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp result nixnet-options-docs.md
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest nixnet-options-docs.md nixnet-options-docs.html \
            --title "Latest" \
            --notes "Auto-updated option docs." \
            --prerelease
